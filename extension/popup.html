<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor Orientador</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="pulse"></div>
        <h1>Gestor Orientador</h1>
      </div>
    </header>

    <main id="chat-container">
      <div id="messages" class="messages-area">
        <div class="message system">
          Olá! Sou seu Gestor Orientador. Como posso te ajudar com os procedimentos de suporte hoje?
        </div>
      </div>
      
      <div class="input-area">
        <input type="text" id="user-input" placeholder="Digite sua dúvida..." autocomplete="off">
        <button id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
